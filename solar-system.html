<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth's Orbit Around the Sun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #eef0f6;
    --ink-soft: #98a0b3;
    --line: rgba(255,255,255,0.16);
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
    --accent: #6cb6ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background:
      radial-gradient(1100px 760px at 16% 18%, rgba(58,80,150,0.18), transparent 62%),
      radial-gradient(980px 720px at 86% 84%, rgba(120,62,128,0.12), transparent 60%),
      #05070d;
  }
  #space { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; display: block; }

  .caption {
    position: fixed; top: 30px; left: 34px; z-index: 2; max-width: 360px;
    pointer-events: none;
  }
  .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-soft); margin: 0 0 10px;
  }
  .caption h1 {
    font-family: "Spectral", Georgia, serif; font-weight: 500;
    font-size: 30px; line-height: 1.1; margin: 0 0 12px; letter-spacing: -0.01em;
  }
  .note {
    font-family: var(--mono); font-size: 11px; line-height: 1.6; letter-spacing: 0.02em;
    color: var(--ink-soft); margin: 0; max-width: 300px;
  }

  #controls {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 3;
    display: flex; align-items: center; gap: 18px;
    background: rgba(10,14,24,0.6); border: 1px solid var(--line);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    padding: 10px 16px; border-radius: 100px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; color: var(--ink-soft);
  }
  #controls .grp { display: flex; align-items: center; gap: 8px; }
  #controls .sep { width: 1px; height: 18px; background: var(--line); }
  #playpause {
    appearance: none; cursor: pointer; border: 1px solid var(--line);
    background: transparent; color: var(--ink);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 100px; transition: background .15s, color .15s;
  }
  #playpause:hover { background: var(--ink); color: #05070d; }
  input[type="range"] {
    -webkit-appearance: none; appearance: none; height: 3px; width: 116px;
    background: var(--line); border-radius: 3px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
    background: var(--accent); cursor: pointer; box-shadow: 0 0 8px rgba(108,182,255,.6);
  }
  input[type="range"]::-moz-range-thumb {
    width: 13px; height: 13px; border: none; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }
  #spd { color: var(--ink); min-width: 30px; display: inline-block; }
  .chk { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .chk input { accent-color: var(--accent); cursor: pointer; }

  @media (max-width: 640px) {
    .caption h1 { font-size: 23px; }
    #controls { gap: 12px; padding: 9px 12px; flex-wrap: wrap; max-width: 92vw; justify-content: center; }
  }

  .earthtag {
    position: fixed; z-index: 4; pointer-events: none; white-space: nowrap;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;
    color: var(--accent);
    background: rgba(10,18,32,0.7); border: 1px solid rgba(108,182,255,0.4);
    padding: 4px 9px; border-radius: 100px;
    transform: translateY(-50%); animation: bob 2.2s ease-in-out infinite;
  }
  @keyframes bob { 0%,100% { opacity: .7; } 50% { opacity: 1; } }

  #globeView {
    position: fixed; inset: 0; z-index: 20; opacity: 0; display: none;
    pointer-events: none; background: #05070d;
  }
  #globeView.active { pointer-events: auto; }
  #globeView iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #05070d; }
  #backToSystem {
    position: absolute; top: 18px; left: 18px; z-index: 21;
    appearance: none; cursor: pointer; border: 1px solid var(--line);
    background: rgba(10,14,24,0.7); color: var(--ink);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
    padding: 9px 14px; border-radius: 100px; transition: border-color .15s;
  }
  #backToSystem:hover { border-color: var(--accent); }

  #toGalaxy {
    position: fixed; top: 30px; right: 30px; z-index: 5;
    appearance: none; cursor: pointer; border: 1px solid var(--line);
    background: rgba(10,14,24,0.6); color: var(--ink);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em;
    padding: 9px 14px; border-radius: 100px; transition: border-color .15s;
  }
  #toGalaxy:hover { border-color: var(--accent); }
</style>
</head>
<body>
<nav id="universe-nav" style="position:fixed;top:18px;right:20px;z-index:9999;display:flex;gap:6px;font-family:ui-monospace,SF Mono,Cascadia Mono,Menlo,monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;"><style>#universe-nav a{color:#98a0b3;text-decoration:none;padding:5px 11px;background:rgba(10,14,24,0.65);border:1px solid rgba(255,255,255,0.14);border-radius:100px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:color .15s}#universe-nav a:hover,#universe-nav a.active{color:#eef0f6}</style><a href="index.html">Milky Way</a><a href="local-group.html">Local Group</a><a href="solar-system.html" class="active">Solar System</a><a href="globe.html">Globe</a></nav>
  <canvas id="space"></canvas>

  <div class="caption">
    <p class="eyebrow">Our solar system</p>
    <h1>Earth&rsquo;s orbit around the Sun</h1>
    <p class="note">Relative orbital speeds are true to life &mdash; inner planets race, outer ones crawl. Sizes &amp; distances are compressed to fit the frame.</p>
  </div>

  <div id="controls">
    <button id="playpause" type="button">Pause</button>
    <div class="sep"></div>
    <div class="grp">Speed <input id="speed" type="range" min="0.2" max="8" step="0.1" value="1"><span id="spd">1.0&times;</span></div>
    <div class="sep"></div>
    <label class="chk"><input id="orbits" type="checkbox" checked> Orbits</label>
    <label class="chk"><input id="labels" type="checkbox" checked> Labels</label>
  </div>

  <div id="earthTag" class="earthtag">Click Earth to explore &rarr;</div>
  <a id="toGalaxy" href="index.html">&uarr; Zoom out: the Sun&rsquo;s orbit</a>

  <div id="globeView">
    <iframe id="globeFrame" title="Interactive globe explorer" loading="lazy"></iframe>
    <button id="backToSystem" type="button">&lsaquo; Back to solar system</button>
  </div>

  <script>
  (function () {
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const TILT = 0.46;            // oblique view of the orbital plane
    const EARTH_SECONDS = 18;     // screen-seconds for one Earth orbit at 1x

    // name, orbit radius fraction, drawn size, colour, real period (days)
    const PLANETS = [
      { name: 'Mercury', rf: 0.12,  size: 2.6, color: '#9a8f84', period: 88 },
      { name: 'Venus',   rf: 0.17,  size: 4.3, color: '#e4c489', period: 224.7 },
      { name: 'Earth',   rf: 0.235, size: 4.7, color: '#3f86d6', period: 365.25, earth: true },
      { name: 'Mars',    rf: 0.30,  size: 3.3, color: '#c4502c', period: 687 },
      { name: 'Jupiter', rf: 0.47,  size: 11,  color: '#cBA46a', period: 4333, bands: true },
      { name: 'Saturn',  rf: 0.61,  size: 9,   color: '#d8c089', period: 10759, ring: true },
      { name: 'Uranus',  rf: 0.78,  size: 6,   color: '#a6d8e0', period: 30687 },
      { name: 'Neptune', rf: 0.95,  size: 6,   color: '#3f6fd1', period: 60190 }
    ];
    PLANETS.forEach(function (p) {
      p.angle = Math.random() * Math.PI * 2;
      p.omega = (Math.PI * 2 / EARTH_SECONDS) * (365.25 / p.period);
    });
    let moonAngle = 0;

    let SW = 0, SH = 0, cx = 0, cy = 0, maxR = 0, stars = [];
    function buildStars() {
      const n = Math.max(200, Math.round(SW * SH / 3200));
      stars = [];
      for (let i = 0; i < n; i++) {
        const bright = Math.random() < 0.04;
        stars.push({
          x: Math.random() * SW, y: Math.random() * SH,
          r: 0.3 + Math.random() * 1.0 + (bright ? 1.3 : 0),
          a: 0.16 + Math.random() * 0.6,
          tw: Math.random() < 0.7 ? 0.4 + Math.random() * 2.0 : 0,
          ph: Math.random() * Math.PI * 2
        });
      }
    }
    function resize() {
      SW = window.innerWidth; SH = window.innerHeight;
      canvas.width = SW * DPR; canvas.height = SH * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      cx = SW / 2; cy = SH / 2;
      maxR = Math.min(SW * 0.47, SH * 0.95);
      buildStars();
    }
    window.addEventListener('resize', resize);

    // ---- colour helpers ----
    function hexRGB(h) {
      h = h.replace('#', '');
      return [parseInt(h.substr(0, 2), 16), parseInt(h.substr(2, 2), 16), parseInt(h.substr(4, 2), 16)];
    }
    function mix(rgb, target, k) {
      return 'rgb(' + Math.round(rgb[0] + (target - rgb[0]) * k) + ',' +
        Math.round(rgb[1] + (target - rgb[1]) * k) + ',' +
        Math.round(rgb[2] + (target - rgb[2]) * k) + ')';
    }

    function drawStars(t) {
      for (const s of stars) {
        const tw = s.tw ? 0.6 + 0.4 * Math.sin(t * s.tw + s.ph) : 1;
        const a = s.a * tw;
        if (s.r > 1.3) {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 3.2, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(170,200,255,' + (a * 0.12) + ')'; ctx.fill();
        }
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + a + ')'; ctx.fill();
      }
    }

    function drawSun(t) {
      const pulse = 1 + 0.03 * Math.sin(t * 1.4);
      // outer corona
      const cor = ctx.createRadialGradient(cx, cy, 6, cx, cy, 120 * pulse);
      cor.addColorStop(0, 'rgba(255,214,140,0.55)');
      cor.addColorStop(0.25, 'rgba(255,170,70,0.22)');
      cor.addColorStop(1, 'rgba(255,150,60,0)');
      ctx.fillStyle = cor;
      ctx.beginPath(); ctx.arc(cx, cy, 120 * pulse, 0, Math.PI * 2); ctx.fill();
      // body
      const body = ctx.createRadialGradient(cx - 5, cy - 5, 2, cx, cy, 26);
      body.addColorStop(0, '#fff6e0');
      body.addColorStop(0.5, '#ffd277');
      body.addColorStop(1, '#f59a36');
      ctx.fillStyle = body;
      ctx.beginPath(); ctx.arc(cx, cy, 26, 0, Math.PI * 2); ctx.fill();
    }

    function planetPos(p) {
      return {
        x: cx + Math.cos(p.angle) * p.rf * maxR,
        y: cy + Math.sin(p.angle) * p.rf * maxR * TILT,
        far: Math.sin(p.angle) < 0
      };
    }

    function drawOrbit(p) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.rf * maxR, p.rf * maxR * TILT, 0, 0, Math.PI * 2);
      ctx.strokeStyle = p.earth ? 'rgba(108,182,255,0.32)' : 'rgba(255,255,255,0.10)';
      ctx.lineWidth = p.earth ? 1.1 : 0.8;
      ctx.stroke();
      ctx.restore();
    }

    function drawPlanet(p, pos, t) {
      const rgb = hexRGB(p.color);
      // ring (back half) for Saturn
      if (p.ring) {
        ctx.save(); ctx.translate(pos.x, pos.y); ctx.scale(1, TILT);
        ctx.beginPath(); ctx.arc(0, 0, p.size * 2.0, Math.PI, Math.PI * 2);
        ctx.strokeStyle = 'rgba(216,196,150,0.85)'; ctx.lineWidth = p.size * 0.8; ctx.stroke();
        ctx.restore();
      }
      // body with sun-lit shading
      const dx = cx - pos.x, dy = cy - pos.y, d = Math.hypot(dx, dy) || 1;
      const lx = pos.x + (dx / d) * p.size * 0.55, ly = pos.y + (dy / d) * p.size * 0.55;
      const g = ctx.createRadialGradient(lx, ly, p.size * 0.1, pos.x, pos.y, p.size * 1.08);
      g.addColorStop(0, mix(rgb, 255, 0.45));
      g.addColorStop(0.55, p.color);
      g.addColorStop(1, mix(rgb, 0, 0.55));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2); ctx.fill();
      // Jupiter banding hint
      if (p.bands) {
        ctx.save();
        ctx.beginPath(); ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2); ctx.clip();
        ctx.strokeStyle = 'rgba(150,110,70,0.4)'; ctx.lineWidth = 1.4;
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath(); ctx.moveTo(pos.x - p.size, pos.y + i * p.size * 0.42);
          ctx.lineTo(pos.x + p.size, pos.y + i * p.size * 0.42); ctx.stroke();
        }
        ctx.restore();
      }
      // ring (front half) for Saturn
      if (p.ring) {
        ctx.save(); ctx.translate(pos.x, pos.y); ctx.scale(1, TILT);
        ctx.beginPath(); ctx.arc(0, 0, p.size * 2.0, 0, Math.PI);
        ctx.strokeStyle = 'rgba(228,210,168,0.95)'; ctx.lineWidth = p.size * 0.8; ctx.stroke();
        ctx.restore();
      }
      // Earth: moon + highlight
      if (p.earth) {
        const mr = p.size + 9;
        const mx = pos.x + Math.cos(moonAngle) * mr;
        const my = pos.y + Math.sin(moonAngle) * mr * TILT;
        ctx.beginPath(); ctx.arc(mx, my, 1.7, 0, Math.PI * 2);
        ctx.fillStyle = '#cfd2d8'; ctx.fill();
        const hp = 0.5 + 0.5 * Math.sin(t * 2.2);
        ctx.beginPath(); ctx.arc(pos.x, pos.y, p.size + 4 + hp * 2, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(108,182,255,' + (0.5 - hp * 0.32) + ')'; ctx.lineWidth = 1.2; ctx.stroke();
      }
    }

    function drawLabel(p, pos) {
      ctx.font = (p.earth ? 'italic 13px "Spectral", serif' : '11px ' + getComputedStyle(document.body).getPropertyValue('--mono'));
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = p.earth ? 'rgba(150,200,255,0.95)' : 'rgba(180,186,200,0.7)';
      ctx.fillText(p.name, pos.x, pos.y + p.size + (p.ring ? 7 : 4));
    }

    // ---- loop ----
    let last = null, playing = true, speed = 1, showOrbits = true, showLabels = true;
    const earthRef = PLANETS.find(function (p) { return p.earth; });
    let state = 'system', zoomT = 0;
    const ZOOM_MAX = 64, ZOOM_IN = 1.15, ZOOM_OUT = 0.9;
    const gv = document.getElementById('globeView');
    const gf = document.getElementById('globeFrame');
    const tag = document.getElementById('earthTag');
    function easeIO(k) { return k < 0.5 ? 4 * k * k * k : 1 - Math.pow(-2 * k + 2, 3) / 2; }
    function smooth(x) { x = Math.max(0, Math.min(1, x)); return x * x * (3 - 2 * x); }

    function frame(ts) {
      if (SW !== window.innerWidth || SH !== window.innerHeight) resize();
      if (last === null) last = ts;
      const dt = Math.min(0.05, (ts - last) / 1000); last = ts;
      const t = ts / 1000;
      if (playing && state === 'system') {
        PLANETS.forEach(function (p) { p.angle += p.omega * dt * speed; });
        moonAngle += (Math.PI * 2 / 2.2) * dt * speed;
      }
      // zoom transition progress
      if (state === 'zooming') { zoomT += dt / ZOOM_IN; if (zoomT >= 1) { zoomT = 1; state = 'globe'; } }
      else if (state === 'unzooming') { zoomT -= dt / ZOOM_OUT; if (zoomT <= 0) { zoomT = 0; state = 'system'; } }

      ctx.clearRect(0, 0, SW, SH);
      drawStars(t);

      let transformed = false;
      if (zoomT > 0) {
        const e = easeIO(zoomT), s = 1 + e * ZOOM_MAX;
        const ep = planetPos(earthRef);
        ctx.save();
        ctx.translate(ep.x + (cx - ep.x) * e, ep.y + (cy - ep.y) * e);
        ctx.scale(s, s);
        ctx.translate(-ep.x, -ep.y);
        transformed = true;
      }
      if (showOrbits) PLANETS.forEach(drawOrbit);
      const positions = PLANETS.map(planetPos);
      PLANETS.forEach(function (p, i) { if (positions[i].far) drawPlanet(p, positions[i], t); });
      drawSun(t);
      PLANETS.forEach(function (p, i) { if (!positions[i].far) drawPlanet(p, positions[i], t); });
      if (transformed) ctx.restore();
      if (showLabels && state === 'system' && zoomT < 0.04) PLANETS.forEach(function (p, i) { drawLabel(p, positions[i]); });

      // crossfade the interactive globe in over the back half of the zoom
      const ov = smooth((zoomT - 0.5) / 0.5);
      gv.style.display = zoomT > 0 ? 'block' : 'none';
      gv.style.opacity = ov;
      gv.classList.toggle('active', state === 'globe');
      // Earth affordance only in the system view
      if (state === 'system') {
        const ep = planetPos(earthRef);
        tag.style.display = 'block';
        tag.style.left = (ep.x + earthRef.size + 12) + 'px';
        tag.style.top = (ep.y - 6) + 'px';
      } else { tag.style.display = 'none'; }

      requestAnimationFrame(frame);
    }

    resize();
    requestAnimationFrame(frame);

    // ---- controls ----
    const pp = document.getElementById('playpause');
    pp.addEventListener('click', function () {
      playing = !playing; pp.textContent = playing ? 'Pause' : 'Play';
      if (playing) last = null;
    });
    const sp = document.getElementById('speed'), spd = document.getElementById('spd');
    sp.addEventListener('input', function () {
      speed = parseFloat(sp.value); spd.textContent = speed.toFixed(1) + '\u00d7';
    });
    document.getElementById('orbits').addEventListener('change', function (e) { showOrbits = e.target.checked; });
    document.getElementById('labels').addEventListener('change', function (e) { showLabels = e.target.checked; });

    // ---- zoom into Earth -> interactive globe ----
    function earthHit(mx, my) {
      const ep = planetPos(earthRef);
      return Math.hypot(mx - ep.x, my - ep.y) < earthRef.size + 16;
    }
    function enterGlobe() {
      if (state !== 'system') return;
      if (!gf.src) gf.src = 'globe.html';
      state = 'zooming';
    }
    canvas.addEventListener('pointermove', function (e) {
      canvas.style.cursor = (state === 'system' && earthHit(e.clientX, e.clientY)) ? 'pointer' : 'default';
    });
    canvas.addEventListener('click', function (e) {
      if (state === 'system' && earthHit(e.clientX, e.clientY)) enterGlobe();
    });
    document.getElementById('backToSystem').addEventListener('click', function () {
      if (state === 'globe' || state === 'zooming') state = 'unzooming';
    });

    // Hide the "zoom out to galaxy" link when this view is embedded inside the galaxy
    if (window.self !== window.top) {
      var tg = document.getElementById('toGalaxy'); if (tg) tg.style.display = 'none';
    }
  })();
  </script>
</body>
</html>
